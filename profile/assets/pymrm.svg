<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400" role="img" aria-label="pymrm — diffusion, convection and reaction in a multiphase reactor">
  <defs>
    <linearGradient id="pmBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="tube" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c7d2fe"/>
      <stop offset="0.5" stop-color="#a5b4fc"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="conc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <radialGradient id="bub" cx="0.35" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0.45"/>
    </radialGradient>
  </defs>

  <rect width="640" height="400" rx="16" fill="url(#pmBg)"/>
  <text x="32" y="46" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="700" fill="#312e81">pymrm</text>
  <text x="140" y="46" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#64748b">multiphase reactor modeling</text>

  <!-- reactor tube -->
  <g>
    <rect x="60" y="90" width="520" height="120" rx="60" fill="url(#tube)" stroke="#6366f1" stroke-width="2"/>
    <!-- rising gas bubbles -->
    <g>
      <circle cx="150" cy="170" r="14" fill="url(#bub)"/>
      <circle cx="230" cy="140" r="10" fill="url(#bub)"/>
      <circle cx="300" cy="175" r="16" fill="url(#bub)"/>
      <circle cx="380" cy="135" r="9" fill="url(#bub)"/>
      <circle cx="440" cy="168" r="13" fill="url(#bub)"/>
      <circle cx="510" cy="145" r="11" fill="url(#bub)"/>
    </g>
    <!-- inlet / outlet arrows (convection) -->
    <g stroke="#1e293b" stroke-width="3" fill="#1e293b">
      <line x1="20" y1="150" x2="58" y2="150"/>
      <polygon points="58,150 46,144 46,156"/>
      <line x1="582" y1="150" x2="618" y2="150"/>
      <polygon points="620,150 608,144 608,156"/>
    </g>
    <text x="16" y="138" font-family="Arial" font-size="13" fill="#475569">in</text>
    <text x="600" y="138" font-family="Arial" font-size="13" fill="#475569">out</text>
  </g>

  <!-- axes for concentration profile -->
  <g transform="translate(60,250)">
    <line x1="0" y1="100" x2="520" y2="100" stroke="#94a3b8" stroke-width="2"/>
    <line x1="0" y1="0" x2="0" y2="100" stroke="#94a3b8" stroke-width="2"/>
    <text x="255" y="128" font-family="Arial" font-size="13" fill="#64748b">axial position  z</text>
    <text x="-8" y="-6" font-family="Arial" font-size="13" fill="#64748b" text-anchor="end">c</text>

    <!-- diffusion-convection-reaction profile -->
    <path d="M0 8 C 120 12, 200 40, 300 62 C 380 80, 450 92, 520 96"
          fill="none" stroke="url(#conc)" stroke-width="4" stroke-linecap="round"/>
    <!-- discretization grid points -->
    <g fill="#0ea5e9">
      <circle cx="0" cy="8" r="4"/><circle cx="87" cy="15" r="4"/>
      <circle cx="173" cy="34" r="4"/><circle cx="260" cy="55" r="4"/>
      <circle cx="347" cy="74" r="4"/><circle cx="433" cy="89" r="4"/>
      <circle cx="520" cy="96" r="4"/>
    </g>
  </g>

  <!-- legend chips -->
  <g font-family="Arial" font-size="13">
    <rect x="330" y="60" width="86" height="22" rx="11" fill="#e0e7ff"/><text x="345" y="75" fill="#3730a3">diffusion</text>
    <rect x="424" y="60" width="96" height="22" rx="11" fill="#dbeafe"/><text x="439" y="75" fill="#1e40af">convection</text>
    <rect x="528" y="60" width="84" height="22" rx="11" fill="#cffafe"/><text x="543" y="75" fill="#155e75">reaction</text>
  </g>
</svg>
